<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#103A56"><meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css"><title>Sofőr mód – Fuvarszervező V8</title>
<style>
.driver-top{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,#103a56,#246f98);color:#fff;padding:max(16px,env(safe-area-inset-top)) 16px 14px;display:flex;justify-content:space-between;align-items:center}
.driver-main{max-width:700px;margin:auto;padding:14px 12px calc(92px + env(safe-area-inset-bottom))}
.driver-task{background:#fff;border-radius:22px;padding:16px;margin-bottom:13px;box-shadow:0 8px 26px #103a5612;border:1px solid #dbe6ec}
.driver-task.done{border-left:7px solid #16805d}.driver-task h2{font-size:18px;margin:0 0 7px}.driver-task p{font-size:13px;color:#657783;margin:5px 0;line-height:1.4}
.primary-large{width:100%;padding:15px;font-size:15px;margin-top:10px}.task-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.transfer-log{font-size:12px;background:#eef6fa;border-radius:14px;padding:11px;margin-bottom:10px}
.modal-sheet{padding:18px}.photo-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo-preview img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}
</style></head>
<body>
<header class="driver-top"><div><div class="eyebrow">SOFŐR MÓD</div><h1 id="driverName">Betöltés…</h1></div><button id="logoutBtn" class="outline">Kilépés</button></header>
<main class="driver-main"><div id="todayInfo" class="notice"></div><div id="transferInfo"></div><div id="taskList"></div></main>

<dialog id="transferDialog"><form id="transferForm" class="modal-sheet">
<div class="dialog-head"><h3>Feladat átadása</h3><button type="button" class="close" onclick="transferDialog.close()">×</button></div>
<input id="transferTaskId" type="hidden"><label>Átadás neki<select id="transferTo"></select></label>
<div id="transferWarning" class="notice hidden"></div><button type="submit">Feladat átadása</button></form></dialog>

<dialog id="reportDialog"><form id="reportForm" class="modal-sheet">
<div class="dialog-head"><h3 id="reportTitle">Szállítólevél / jelentés</h3><button type="button" class="close" onclick="reportDialog.close()">×</button></div>
<input id="reportTaskId" type="hidden">
<label>Szállítólevél fotó(k)<input id="photos" type="file" accept="image/*" capture="environment" multiple></label>
<div id="photosPreview" class="photo-preview"></div>
<label>Megjegyzés<textarea id="note" rows="3" placeholder="Mi hiányzott, mit nem kaptatok meg?"></textarea></label>
<div class="record-box"><b>Hangfelvétel</b><p id="recordStatus">Nincs felvétel.</p>
<div class="toolbar-actions"><button type="button" id="recordStart">Felvétel</button><button type="button" id="recordStop" class="secondary" disabled>Leállítás</button><button type="button" id="dictateBtn" class="secondary">Diktálás</button></div>
<audio id="audio" controls class="hidden"></audio>
<label>Szöveges átirat<textarea id="transcript" rows="4"></textarea></label></div>
<label class="check"><input id="completed" type="checkbox"> Átvétel kész / teljesítve</label>
<button type="submit">Jelentés elküldése</button></form></dialog>

<script src="/socket.io/socket.io.js"></script><script src="driver.js"></script></body></html>
