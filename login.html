<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#103A56"><link rel="stylesheet" href="styles.css"><title>Fuvarszervező V8 – Belépés</title>
<style>
.login-shell{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#103a56,#246f98)}
.login-card{width:min(94vw,430px);background:#fff;border-radius:26px;padding:24px;box-shadow:0 28px 80px #0004}
.login-card h1{margin:4px 0 8px}.login-card p{color:#6c7d88}.login-card button{width:100%;margin-top:8px}
.login-error{background:#fdeaea;color:#a52d2d;padding:11px;border-radius:13px;margin-bottom:12px}
</style></head>
<body><main class="login-shell"><form id="loginForm" class="login-card">
<div class="eyebrow dark">STAND 98 · LOGISZTIKA</div><h1>Fuvarszervező V8</h1>
<p>Admin és sofőr bejelentkezés</p><div id="error" class="login-error hidden"></div>
<label>E-mail-cím<input id="email" type="email" autocomplete="username" required></label>
<label>Jelszó<input id="password" type="password" autocomplete="current-password" required></label>
<button type="submit">Bejelentkezés</button></form></main>
<script src="login.js"></script></body></html>
